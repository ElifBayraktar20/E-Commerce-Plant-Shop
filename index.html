<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Plant Shop</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quella&display=swap" rel="stylesheet">
</head>

<body>
    <!-- header start -->

    <header class="headerContainer">

        <div>
            <h1 class="logoText">GREENMIND</h1>
        </div>

        <div class="nav-list">
            <ul>
                <li><a class="homeLink" href="#">Home</a></li>
                <li> <a class="productsLink" href="#">Products</a></li>
                </li><a class="contactsLink" href="#">Contacts</a>
                <li>
            </ul>
        </div>

        <div class="nav-icons">
            <img class="shopping" src="./images/shopping.svg">
            <img class="person" src="./images/person.svg">
            <img src="./images/Line .svg">
            <img class="option" src="./images/option.svg">
        </div>

    </header>
    <!-- header end -->

    <!-- Hero start-->

    <div class="heroContainer">

        <!-- hero sol -->
        <div class="heroLeft">

            <div class="heroMainText">
                <p>Buy your dream plants</p>
            </div>

            <div class="heroMetrics">
                <div class="species">
                    <span>50+</span>
                    <span>Plant Species</span>
                </div>
                <img src="./images/Line 2.svg">
                <!-- <div class="line"></div> -->
                <div class="customers">
                    <span>100+</span>
                    <span>Customers</span>
                </div>
            </div>

            <div class="searchBar">
                <input type="text" placeholder="What are you looking for?" id="search">
                <button class="searchButton">
                    <img src="./images/search.svg">
                </button>
            </div>
        </div>

        <!-- hero sağ -->

        <div class="heroRight">
            <div class="bubble"></div>

            <img src="./images/hero-plant.svg" alt="">
        </div>
    </div>

    <!-- Hero end-->



    <!-- footer start -->

    <footer>
        <div class="footer">

            <div class="greenmind">
                <div class="greenmindText">
                    <h4>GREENMIND</h4>
                    <p>We help you find your dream plant</p>
                </div>
                <div class="greenmindİcons"></div>

            </div>
            <!-- <p class="TermOfUse">2023 all Right Reserved Term of use GREENMIND</p> -->


        </div>


    </footer>

    <!-- footer end -->

</body>

</html>
